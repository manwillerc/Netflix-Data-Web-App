<!DOCTYPE html>
<html>
    <head>
        {% load static %}

        <title> {%block title %} My Site {%endblock%}</title>

        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    </head>
    <body>

        <nav>
            <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
            <a href="{%url 'about'%}" class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}"> About </a>
            <a href="{%url 'dashboard'%}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"> Analytics </a>
            <a href="{%url 'prediction_tool'%}" class="{% if request.resolver_match.url_name == 'prediction_tool' %}active{% endif %}"> Prediction Tool </a>
            <a href="{%url 'top_charts'%}" class="{% if request.resolver_match.url_name == 'top_charts' %}active{% endif %}"> Top Charts </a>
        </nav>

        {%block content%}
        {%endblock%}

    </body>
</html>
