{% extends "core/base.html" %}

{% block content %}

<h1>Delete Viewer</h1>
<p> 
    Are you sure you want to delete?
    <br>
    <em>This will delete ALL associated accounts</em> 
</p>


<form method="post">
    {% csrf_token %}
    <button type= "submit"> Yes, delete! </button>
    <a href="{% url 'viewer_details' viewer.pk %}">Cancel</a>
</form>
{% endblock%}
